<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your modern ecommerce store for quality products">
  <meta name="theme-color" content="#bd5e00ff">

  <link rel="icon" type="image/png" href="{{ organization.logo.url }}" />
  <title>{% block title %} Hello Bajar {% endblock %}</title>

  <!-- Social Preview -->
  <meta property="og:title" content="Hello Bajar">
  <meta property="og:description" content="Your modern ecommerce store for quality products">
  <meta property="og:image" content="{{ organization.logo.url }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ request.build_absolute_uri }}">

  <!-- External CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">

  <!-- Tailwind -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Theme Styles -->
  <style>
    :root {
      --primary: #FF7F00;
      --primary-dark: #CC6600;
      --bg-brown: #8B4513;
      --text-light: #ffffff;
      --text-primary: #333333;
      --text-secondary: #666666;
      --bg-light: #fff8f0;
      --success: #2ecc71;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.12);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.1);
    }
    body, p, span, li, button, input { font-family: 'Roboto', sans-serif; }
    h1,h2,h3,h4,h5,h6 { font-family:'Playfair Display', Georgia, serif; }

    .btn { padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 600; transition: all 0.3s ease; cursor: pointer; }
    .btn-primary { background-color: var(--primary); color: var(--text-light); box-shadow: var(--shadow-sm); }
    .btn-primary:hover { background-color: var(--primary-dark); transform: translateY(-1px); box-shadow: var(--shadow-md); }

    .fade-in { animation: fadeIn 0.5s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Loading overlay */
    #loading-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255,255,255,0.7);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }
    #loading-overlay.show { display: flex; }

    /* Scrollbar Style (Works on Chrome, Edge, Brave, Opera) */
::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

::-webkit-scrollbar-track {
  background: #fff3e6;   /* Light orange background */
}

::-webkit-scrollbar-thumb {
  background: #FF7F00;   /* Primary orange */
  border-radius: 10px;
}

::-webkit-scrollbar-thumb:hover {
  background: #CC6600;   /* Darker orange on hover */
}

/* Firefox Scrollbar */
html {
  scrollbar-color: #FF7F00 #fff3e6;  
  scrollbar-width: thin;
}


    /* Hide Google Translate top bar completely */
    .goog-te-banner-frame.skiptranslate,
    .skiptranslate { display: none !important; }
    body { top: 0 !important; }
  </style>

  {% block extra_head %}{% endblock %}
</head>

<body class="min-h-screen flex flex-col">


  
  <!-- Google Translate (Hidden) -->
  <div id="google_translate_element" style="display:none;"></div>


 <!-- Loading Overlay -->
<div id="loading-overlay" class="fixed inset-0 bg-white bg-opacity-50 flex items-center justify-center z-50">
  <div class="flex flex-col items-center gap-2">
    <!-- Circular Spinner -->
    <div class="w-12 h-12 rounded-full border-4 border-gray-200 border-t-[4px] animate-spin"
         style="border-top-color:#f08e7a; border-bottom-color:#8B4513;">
    </div>
    
  </div>
</div>

  <!-- Navbar -->
  {% include 'website/components/navbar.html' %}

  <!-- Main Content -->
  <main class="lg:mt-34 mt-18 flex-grow container mx-auto px-4 py-8 ">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  {% include 'website/components/footer.html' %}

  <!-- External JS -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.7.12/sweetalert2.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

  <!-- Toastr Messages -->
  <script>
    {% if messages %}
      {% for message in messages %}
        toastr.options = {
          "closeButton": true, "progressBar": true, "positionClass": "toast-top-right", "timeOut": "3000"
        };
        {% if message.tags == 'success' %} toastr.success("{{ message|escapejs }}");
        {% elif message.tags == 'error' %} toastr.error("{{ message|escapejs }}");
        {% elif message.tags == 'warning' %} toastr.warning("{{ message|escapejs }}");
        {% else %} toastr.info("{{ message|escapejs }}");
        {% endif %}
      {% endfor %}
    {% endif %}
  </script>

  <script>
    let currentLang = 'en';

    function showLoading() { $('#loading-overlay').addClass('show'); }
    function hideLoading() { $('#loading-overlay').removeClass('show'); }
function changeLanguage(lang) {
    if (lang === currentLang) return;
    currentLang = lang;

    showLoading();

    // -------------------------------
    // 🟧 1) If language = English
    // -------------------------------
    if (lang === 'en') {
        // Clear ALL Google Translate cookies properly
        document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=' + window.location.hostname;
        document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
        document.cookie = 'googtrans=/en/en; path=/; domain=' + window.location.hostname;
        document.cookie = 'googtrans=/en/en; path=/;';
        
        // Clear session storage
        sessionStorage.removeItem('preferredLang');
        sessionStorage.setItem('preferredLang', 'en');
        
        // Reset Google Translate select if it exists
        const googleSelect = document.querySelector('.goog-te-combo');
        if (googleSelect) {
            googleSelect.value = 'en';
            googleSelect.dispatchEvent(new Event('change'));
        }

        // Reload page after a brief delay
        setTimeout(() => {
            window.location.href = window.location.pathname + window.location.search;
        }, 500);

        return;
    }

    // -------------------------------
    // 🟦 2) If language = Nepali
    // -------------------------------
    if (lang === 'ne') {
        const googleSelect = document.querySelector('.goog-te-combo');
        if (googleSelect) {
            googleSelect.value = 'ne';
            googleSelect.dispatchEvent(new Event('change'));
        }

        // Set cookie for Google Translate
        document.cookie = 'googtrans=/en/ne; path=/; domain=' + window.location.hostname;
        document.cookie = 'googtrans=/en/ne; path=/;';
        sessionStorage.setItem('preferredLang', 'ne');

        // Wait for translation then reload
        setTimeout(() => {
            hideLoading();
            window.location.reload();
        }, 800);

        return;
    }
}

function initGoogleTranslate() {
    new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,ne',
        autoDisplay: false,
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE
    }, 'google_translate_element');

    // Apply saved language preference
    const preferredLang = sessionStorage.getItem('preferredLang');
    if (preferredLang === 'ne') {
        setTimeout(() => {
            const googleSelect = document.querySelector('.goog-te-combo');
            if (googleSelect) {
                googleSelect.value = 'ne';
                googleSelect.dispatchEvent(new Event('change'));
            }
        }, 500);
    }

    // Remove Google top bar dynamically
    const observer = new MutationObserver(() => {
        document.querySelectorAll('.goog-te-banner-frame.skiptranslate').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.skiptranslate iframe').forEach(el => el.style.display = 'none');
    });
    observer.observe(document.body, { childList: true, subtree: true });
}

function loadGoogleTranslate() {
    const script = document.createElement('script');
    script.src = "https://translate.google.com/translate_a/element.js?cb=initGoogleTranslate";
    script.defer = true;
    document.body.appendChild(script);
}

document.addEventListener('DOMContentLoaded', () => {
    const preferredLang = sessionStorage.getItem('preferredLang') || 'en';
    if (['en','ne'].includes(preferredLang)) {
        const selector = document.getElementById('custom_translate');
        if (selector) {
            selector.value = preferredLang;
        }
        currentLang = preferredLang;
    }
    loadGoogleTranslate();
});

document.getElementById('custom_translate')?.addEventListener('change', function() {
    changeLanguage(this.value);
});
  </script>

  {% block extra_js %}{% endblock %}
</body>
</html>
