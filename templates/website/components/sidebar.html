<!-- Sidebar Filter Component -->
<aside class="hidden lg:block space-y-4 sticky top-20">

  <!-- Price Filter Box -->
  <div class="bg-white shadow-md rounded-lg p-4 border border-gray-100">
    <div class="flex items-center justify-between mb-3">
      <h5 class="text-base font-bold text-gray-900">Price Range</h5>
      <button type="button" id="resetPrice" class="text-xs cursor-pointer text-orange-600 hover:text-orange-700 font-medium transition">
        Reset
      </button>
    </div>

    <div class="space-y-3">
      <div class="flex gap-2">
        <div class="flex-1">
          <label for="minPrice" class="text-xs font-semibold text-gray-600 uppercase mb-1 block">Min</label>
          <div class="relative">
            <span class="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400 text-xs">Rs</span>
            <input id="minPrice" type="number" placeholder="0" min="0"
              class="w-full pl-7 pr-2 py-1.5 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-orange-500 text-sm font-medium text-gray-900">
          </div>
        </div>
        <div class="flex-1">
          <label for="maxPrice" class="text-xs font-semibold text-gray-600 uppercase mb-1 block">Max</label>
          <div class="relative">
            <span class="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400 text-xs">Rs</span>
            <input id="maxPrice" type="number" placeholder="10000" min="0"
              class="w-full pl-7 pr-2 py-1.5 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-orange-500 text-sm font-medium text-gray-900">
          </div>
        </div>
      </div>

      <div class="space-y-1.5">
        <div class="flex items-center justify-between text-xs text-gray-600">
          <span>Rs 0</span>
          <span id="rangeValue" class="font-bold text-orange-600">Rs 10000</span>
        </div>
        <input type="range" id="priceRange" min="0" max="10000" value="10000" step="100"
          class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-orange-500">
      </div>
    </div>
  </div>

  <!-- Categories Filter Box with Subcategories -->
  <div class="bg-white shadow-md rounded-lg p-4 border border-gray-100">
    <div class="flex items-center justify-between mb-3">
      <h5 class="text-base font-bold text-gray-900">Categories</h5>
      <button type="button" id="resetCategories" class="cursor-pointer text-xs text-orange-600 hover:text-orange-700 font-medium transition">
        Clear
      </button>
    </div>

    <div class="max-h-80 overflow-y-auto pr-1">
      {% for category in categories %}
        <!-- Main Category -->
        <div class="category-group">
          <label class="flex items-center gap-2 cursor-pointer hover:bg-orange-50 p-2 rounded-md transition group">
            <input type="checkbox" name="category" value="{{ category.id }}" 
                   class="w-4 h-4 text-orange-600 border-gray-300 rounded focus:ring-1 focus:ring-orange-500 cursor-pointer category-checkbox">
            <span class="text-sm font-medium text-gray-700 group-hover:text-orange-600 transition flex-1">
              {{ category.name }}
            </span>
            
            <!-- Toggle icon for subcategories -->
            {% if category.subcategories.exists %}
            <button type="button" class="toggle-subcategory p-1 text-gray-400 hover:text-orange-600 transition">
              <i class="fas fa-chevron-down text-xs transform transition-transform duration-200"></i>
            </button>
            {% endif %}
            
            <span class="text-xs text-gray-400 font-medium">{{ category.products.count }}</span>
          </label>

          <!-- Subcategories -->
          {% if category.subcategories.exists %}
          <div class="subcategories hidden ml-4 mt-1 space-y-1 border-l-2 border-orange-200 pl-2">
            {% for subcategory in category.subcategories.all %}
            <label class="flex items-center gap-2 cursor-pointer hover:bg-orange-50 p-1.5 rounded-md transition group">
              <input type="checkbox" name="subcategory" value="{{ subcategory.id }}" 
                     data-parent-category="{{ category.id }}"
                     class="w-3.5 h-3.5 text-orange-600 border-gray-300 rounded focus:ring-1 focus:ring-orange-500 cursor-pointer subcategory-checkbox">
              <span class="text-xs text-gray-600 group-hover:text-orange-600 transition flex-1">
                {{ subcategory.name }}
              </span>
              <span class="text-xs text-gray-400">{{ subcategory.products.count|default:0 }}</span>
            </label>
            {% endfor %}
          </div>
          {% endif %}
        </div>
      {% empty %}
        <p class="text-sm text-gray-500 text-center py-4">No categories available</p>
      {% endfor %}
    </div>
  </div>

</aside>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Toggle subcategories visibility
  document.querySelectorAll('.toggle-subcategory').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      const subcategories = this.closest('.category-group').querySelector('.subcategories');
      const icon = this.querySelector('i');
      
      if (subcategories) {
        subcategories.classList.toggle('hidden');
        icon.classList.toggle('rotate-180');
      }
    });
  });

  // Parent category checkbox logic
  document.querySelectorAll('.category-checkbox').forEach(checkbox => {
    checkbox.addEventListener('change', function() {
      const categoryId = this.value;
      const subcategoryCheckboxes = document.querySelectorAll(`.subcategory-checkbox[data-parent-category="${categoryId}"]`);
      
      if (this.checked) {
        // Show subcategories when parent is checked
        const subcategoriesDiv = this.closest('.category-group').querySelector('.subcategories');
        if (subcategoriesDiv) {
          subcategoriesDiv.classList.remove('hidden');
          this.closest('.category-group').querySelector('.toggle-subcategory i')?.classList.add('rotate-180');
        }
      } else {
        // Uncheck all subcategories when parent is unchecked
        subcategoryCheckboxes.forEach(sub => sub.checked = false);
      }
    });
  });

  // Subcategory checkbox logic
  document.querySelectorAll('.subcategory-checkbox').forEach(checkbox => {
    checkbox.addEventListener('change', function() {
      const parentCategoryId = this.dataset.parentCategory;
      const parentCheckbox = document.querySelector(`.category-checkbox[value="${parentCategoryId}"]`);
      
      // Auto-check parent if any subcategory is checked
      const anySubChecked = document.querySelectorAll(`.subcategory-checkbox[data-parent-category="${parentCategoryId}"]:checked`).length > 0;
      if (parentCheckbox && anySubChecked) {
        parentCheckbox.checked = true;
      }
    });
  });

  // Reset categories
  document.getElementById('resetCategories').addEventListener('click', function(e) {
    e.preventDefault();
    document.querySelectorAll('input[name="category"], input[name="subcategory"]').forEach(cb => {
      cb.checked = false;
    });
    // Collapse all subcategories
    document.querySelectorAll('.subcategories').forEach(sub => sub.classList.add('hidden'));
    document.querySelectorAll('.toggle-subcategory i').forEach(icon => icon.classList.remove('rotate-180'));
  });

  // Reset price
  document.getElementById('resetPrice').addEventListener('click', function(e) {
    e.preventDefault();
    document.getElementById('minPrice').value = '';
    document.getElementById('maxPrice').value = '';
    const range = document.getElementById('priceRange');
    range.value = range.max;
    document.getElementById('rangeValue').textContent = `Rs ${range.value}`;
  });

  // Price range slider sync
  const priceRange = document.getElementById('priceRange');
  const maxPriceInput = document.getElementById('maxPrice');
  
  priceRange.addEventListener('input', function() {
    document.getElementById('rangeValue').textContent = `Rs ${this.value}`;
    maxPriceInput.value = this.value;
  });

  maxPriceInput.addEventListener('input', function() {
    priceRange.value = this.value;
    document.getElementById('rangeValue').textContent = `Rs ${this.value}`;
  });
});
</script>
