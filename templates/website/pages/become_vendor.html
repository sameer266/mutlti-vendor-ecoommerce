{% extends 'website/components/base.html' %}
{% load static %}

{% block title %}Become a Vendor - Hello Bajar{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-10 max-w-4xl">

  <h1 class="text-3xl font-bold text-[var(--text-primary)] mb-4">Become a Vendor</h1>
  <p class="text-gray-500 text-sm mb-6">Join our marketplace and start selling today</p>

  <form method="POST" action="{% url 'become_vendor_page'%}"  enctype="multipart/form-data" class="bg-white p-6 rounded-2xl shadow-lg border border-gray-200 space-y-6">
    {% csrf_token %}

    <!-- Personal Info -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-600">First Name</label>
        <input type="text" name="first_name" class="mt-1 w-full border rounded-lg p-2 focus:ring focus:ring-[var(--primary)]" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-600">Last Name</label>
        <input type="text" name="last_name" class="mt-1 w-full border rounded-lg p-2 focus:ring focus:ring-[var(--primary)]" required>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-600">Email</label>
      <input type="email" name="email" class="mt-1 w-full border rounded-lg p-2 focus:ring focus:ring-[var(--primary)]" required>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-600">Phone</label>
      <input type="text" name="phone" class="mt-1 w-full border rounded-lg p-2 focus:ring focus:ring-[var(--primary)]" required>
    </div>

    <!-- Shop Info -->
    <div>
      <label class="block text-sm font-medium text-gray-600">Shop Name</label>
      <input type="text" name="shop_name" class="mt-1 w-full border rounded-lg p-2 focus:ring focus:ring-[var(--primary)]" required>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-600">Shop Description</label>
      <textarea name="description" rows="3" class="mt-1 w-full border rounded-lg p-2 focus:ring focus:ring-[var(--primary)]" placeholder="Max 500 characters"></textarea>
    </div>

    <!-- Address -->
    <div>
      <label class="block text-sm font-medium text-gray-600">Full Address</label>
      <textarea name="address" rows="2" class="mt-1 w-full border rounded-lg p-2 focus:ring focus:ring-[var(--primary)]" required></textarea>
    </div>

    <!-- Province & District -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-600">Province</label>
        <select id="province" name="province" class="mt-1 w-full border rounded-lg p-2 focus:ring focus:ring-[var(--primary)]" required>
          <option value="">Select Province</option>
          {% for prov in nepal_locations %}
            <option value="{{ prov.province }}">{{ prov.province }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-600">District / City</label>
        <select id="district" name="city" class="mt-1 w-full border rounded-lg p-2 focus:ring focus:ring-[var(--primary)]" required>
          <option value="">Select District</option>
        </select>
      </div>
    </div>

    <!-- File Uploads -->
    <div class="space-y-4">
      <!-- Shop Logo -->
      <label class="block">
        <span class="block text-sm font-medium text-gray-600"><span class="text-red-500">*</span> Shop Logo</span>
        <div class="file-drop-area mt-1 border-dashed border-2 border-gray-300 p-4 rounded-lg text-center cursor-pointer">
          <i class="fas fa-store fa-2x text-[var(--primary)] mb-2"></i>
          <input type="file" name="shop_logo" class="hidden" accept="image/*" required onchange="previewFile(this)">
          <img class="preview-img hidden mt-2 mx-auto rounded max-h-32" alt="Shop Logo Preview">
        </div>
      </label>

      <!-- Shop Banner -->
      <label class="block">
        <span class="block text-sm font-medium text-gray-600">Shop Banner (Optional)</span>
        <div class="file-drop-area mt-1 border-dashed border-2 border-gray-300 p-4 rounded-lg text-center cursor-pointer">
          <i class="far fa-image fa-2x text-[var(--primary)] mb-2"></i>
          <input type="file" name="shop_banner" class="hidden" accept="image/*" onchange="previewFile(this)">
          <img class="preview-img hidden mt-2 mx-auto rounded max-h-32" alt="Shop Banner Preview">
        </div>
      </label>

      <!-- PAN Document -->
      <label class="block">
        <span class="block text-sm font-medium text-gray-600"><span class="text-red-500">*</span> PAN Document</span>
        <div class="file-drop-area mt-1 border-dashed border-2 border-gray-300 p-4 rounded-lg text-center cursor-pointer">
          <i class="far fa-file-pdf fa-2x text-[var(--primary)] mb-2"></i>
          <input type="file" name="pan_document" class="hidden" accept="image/*,.pdf" required onchange="previewFile(this)">
          <img class="preview-img hidden mt-2 mx-auto rounded max-h-32" alt="PAN Document Preview">
        </div>
      </label>

      <!-- PAN Number -->
      <input type="text" name="pan_number" placeholder="PAN Number" class="mt-2 w-full border rounded-lg p-2 focus:ring focus:ring-[var(--primary)]" required>

      <!-- Citizenship Front -->
      <label class="block">
        <span class="block text-sm font-medium text-gray-600"><span class="text-red-500">*</span> Citizenship Front</span>
        <div class="file-drop-area mt-1 border-dashed border-2 border-gray-300 p-4 rounded-lg text-center cursor-pointer">
          <i class="far fa-id-card fa-2x text-[var(--primary)] mb-2"></i>
          <input type="file" name="citizenship_front" class="hidden" accept="image/*" required onchange="previewFile(this)">
          <img class="preview-img hidden mt-2 mx-auto rounded max-h-32" alt="Citizenship Front Preview">
        </div>
      </label>

      <!-- Citizenship Back -->
      <label class="block">
        <span class="block text-sm font-medium text-gray-600"><span class="text-red-500">*</span> Citizenship Back</span>
        <div class="file-drop-area mt-1 border-dashed border-2 border-gray-300 p-4 rounded-lg text-center cursor-pointer">
          <i class="far fa-id-card fa-2x text-[var(--primary)] mb-2"></i>
          <input type="file" name="citizenship_back" class="hidden" accept="image/*" required onchange="previewFile(this)">
          <img class="preview-img hidden mt-2 mx-auto rounded max-h-32" alt="Citizenship Back Preview">
        </div>
      </label>

      <!-- Company Registration -->
      <label class="block">
        <span class="block text-sm font-medium text-gray-600"><span class="text-red-500">*</span> Company Registration</span>
        <div class="file-drop-area mt-1 border-dashed border-2 border-gray-300 p-4 rounded-lg text-center cursor-pointer">
          <i class="fas fa-file-alt fa-2x text-[var(--primary)] mb-2"></i>
          <input type="file" name="company_registration" class="hidden" accept="image/*,.pdf" required onchange="previewFile(this)">
          <img class="preview-img hidden mt-2 mx-auto rounded max-h-32" alt="Company Registration Preview">
        </div>
      </label>
    </div>

    <!-- Submit -->
    <div class="flex justify-end">
      <button type="submit" class="bg-[var(--primary)] text-white px-6 py-2 rounded-lg hover:bg-[var(--primary-dark)] cursor-pointer transition">
        Register & Verify OTP
      </button>
    </div>

  </form>

</div>

{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  const locations = {{ nepal_locations|safe }};
  const provinceSelect = document.getElementById('province');
  const districtSelect = document.getElementById('district');

  provinceSelect.addEventListener('change', function() {
    const selectedProvince = this.value;
    districtSelect.innerHTML = '<option value="">Select District</option>';
    const prov = locations.find(p => p.province === selectedProvince);
    if (prov) {
      prov.districts.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d;
        opt.text = d;
        districtSelect.appendChild(opt);
      });
    }
  });
});

// Preview uploaded images
function previewFile(input) {
  const file = input.files[0];
  if(file && file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = input.closest('.file-drop-area').querySelector('.preview-img');
      img.src = e.target.result;
      img.classList.remove('hidden');
    }
    reader.readAsDataURL(file);
  }
}
</script>
{% endblock %}
