{% extends 'dashboard/components/base.html' %}
{% load static %}

{% block title %}Edit Tax Rate{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-10 max-w-lg">

  <!-- Top Back Button -->
  <div class="mb-6">
    <a href="{% url 'admin_tax_rate' %}" 
       class="inline-flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
      <i class="fas fa-arrow-left"></i> Back
    </a>
  </div>

  <!-- Page Heading -->
  <h1 class="text-2xl font-semibold text-gray-800 flex items-center gap-2 mb-6">
    <i class="fas fa-percentage text-blue-600"></i> Edit Tax Rate
  </h1>

  <!-- Form -->
  <form method="POST" class="bg-white p-6 rounded-xl shadow-lg border border-gray-200 space-y-4">
    {% csrf_token %}

    <div>
      <label class="block text-gray-700 font-semibold mb-2 flex items-center gap-2">
        <i class="fas fa-percentage text-gray-500"></i>
        Tax Percentage (%)
      </label>
      <input type="number" step="0.01" min="0" name="tax" value="{{ tax_obj.tax }}"
             class="w-full border rounded-lg p-2 focus:ring focus:ring-blue-400 focus:border-blue-500"
             required>
    </div>

    <div class="flex justify-end gap-3 mt-4">
      <button type="submit"
              class="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
        <i class="fas fa-save"></i> Update Tax
      </button>
    </div>
  </form>

</div>
{% endblock %}
