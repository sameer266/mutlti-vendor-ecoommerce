{% extends 'dashboard/components/base.html' %}
{% load static %}

{% block content %}

<div class="bg-white rounded-xl shadow p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-semibold text-gray-800">Edit Subcategory</h1>
    <a href="{% url 'admin_subcategory_list' %}" class="text-sm text-blue-600 hover:text-blue-800">Back to list</a>
  </div>

  <form method="post" action="{% url 'admin_subcategory_update' subcategory.id %}" enctype="multipart/form-data" class="space-y-6">
    {% csrf_token %}


<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
  <div class="md:col-span-2">
    <label class="block text-sm font-medium text-gray-700">Name</label>
    <input type="text" name="name" value="{{ subcategory.name }}" class="mt-1 block w-full border border-gray-300 rounded-lg p-2.5" required>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700">Category</label>
    <select name="category" class="mt-1 block w-full border border-gray-300 rounded-lg p-2.5" required>
      {% for category in categories %}
        <option value="{{ category.id }}" {% if category.id == subcategory.category.id %}selected{% endif %}>
          {{ category.name }}
        </option>
      {% endfor %}
    </select>
  </div>

</div>

<div class="pt-4">
  <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">Update Subcategory</button>
</div>


  </form>
</div>
{% endblock %}
